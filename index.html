<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Gouttières - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <main>
    <header class="site-header">
        <h1 class="site-title">Studio Gouttières</h1>
        <p class="site-subtitle">Atelier d'arts · Résidence d'artistes</p>
    </header>

    <div class="hero">
        <div class="hero-frame">
            <img src="./images/bruno2003-DSC00989-verb-h12c12-redu.jpg" alt="Studio Gouttières">
        </div>
    </div>

    <section class="lang-row">
        <div class="lang-strip">
            <button type="button" class="lang-box" data-bs-toggle="modal" data-bs-target="#modal-fr">
                <div class="lang-flag">🇫🇷</div>
                <div class="lang-name">Français</div>
            </button>
            <button type="button" class="lang-box" data-bs-toggle="modal" data-bs-target="#modal-nl">
                <div class="lang-flag">🇳🇱</div>
                <div class="lang-name">Nederlands</div>
            </button>
            <button type="button" class="lang-box" data-bs-toggle="modal" data-bs-target="#modal-de">
                <div class="lang-flag">🇩🇪</div>
                <div class="lang-name">Deutsch</div>
            </button>
            <button type="button" class="lang-box" data-bs-toggle="modal" data-bs-target="#modal-en">
                <div class="lang-flag">🇬🇧</div>
                <div class="lang-name">English</div>
            </button>
        </div>
    </section>
    </main>

    <footer class="site-footer">
        <span>Gouttières — Auvergne — France</span>
    </footer>

    <!-- Modal FR -->
    <div class="modal fade" id="modal-fr" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content position-relative">
                <div class="modal-header border-0">
                    <div class="modal-header-actions">
                        <button type="button" class="btn btn-light btn-download" data-download-src="./images/affiche_fr.jpeg" data-download-name="affiche_fr.jpeg">
                            <i class="bi bi-download" aria-hidden="true"></i>
                            Télécharger
                        </button>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fermer"></button>
                    </div>
                </div>
                <div class="modal-body d-flex align-items-center justify-content-center">
                    <img src="./images/affiche_fr.jpeg" alt="Affiche Studio Gouttières - Français" class="img-fluid">
                </div>
            </div>
        </div>
    </div>

    <!-- Modal NL -->
    <div class="modal fade" id="modal-nl" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content position-relative">
                <div class="modal-header border-0">
                    <div class="modal-header-actions">
                        <button type="button" class="btn btn-light btn-download" data-download-src="./images/affiche_nl.jpeg" data-download-name="affiche_nl.jpeg">
                            <i class="bi bi-download" aria-hidden="true"></i>
                            Downloaden
                        </button>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Sluiten"></button>
                    </div>
                </div>
                <div class="modal-body d-flex align-items-center justify-content-center">
                    <img src="./images/affiche_nl.jpeg" alt="Affiche Studio Gouttières - Nederlands" class="img-fluid">
                </div>
            </div>
        </div>
    </div>

    <!-- Modal DE -->
    <div class="modal fade" id="modal-de" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content position-relative">
                <div class="modal-header border-0">
                    <div class="modal-header-actions">
                        <button type="button" class="btn btn-light btn-download" data-download-src="./images/affiche_de.jpeg" data-download-name="affiche_de.jpeg">
                            <i class="bi bi-download" aria-hidden="true"></i>
                            Herunterladen
                        </button>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Schließen"></button>
                    </div>
                </div>
                <div class="modal-body d-flex align-items-center justify-content-center">
                    <img src="./images/affiche_de.jpeg" alt="Affiche Studio Gouttières - Deutsch" class="img-fluid">
                </div>
            </div>
        </div>
    </div>

    <!-- Modal EN -->
    <div class="modal fade" id="modal-en" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content position-relative">
                <div class="modal-header border-0">
                    <div class="modal-header-actions">
                        <button type="button" class="btn btn-light btn-download" data-download-src="./images/affiche_en.jpeg" data-download-name="affiche_en.jpeg">
                            <i class="bi bi-download" aria-hidden="true"></i>
                            Download
                        </button>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                </div>
                <div class="modal-body d-flex align-items-center justify-content-center">
                    <img src="./images/affiche_en.jpeg" alt="Affiche Studio Gouttières - English" class="img-fluid">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.btn-download').forEach(function (btn) {
            btn.addEventListener('click', async function () {
                const src = btn.getAttribute('data-download-src');
                const filename = btn.getAttribute('data-download-name') || 'affiche.jpeg';
                try {
                    btn.disabled = true;
                    const response = await fetch(src);
                    const blob = await response.blob();
                    const blobUrl = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = blobUrl;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(blobUrl);
                } catch (err) {
                    console.error('Erreur de téléchargement :', err);
                } finally {
                    btn.disabled = false;
                }
            });
        });

        // Fermer la modal si on clique sur la zone transparente (en dehors de l'image et des boutons)
        document.querySelectorAll('.modal').forEach(function (modalEl) {
            const content = modalEl.querySelector('.modal-content');
            const body = modalEl.querySelector('.modal-body');
            [content, body].forEach(function (zone) {
                if (!zone) return;
                zone.addEventListener('click', function (e) {
                    if (e.target === content || e.target === body) {
                        bootstrap.Modal.getOrCreateInstance(modalEl).hide();
                    }
                });
            });
        });
    </script>
</body>
</html>
